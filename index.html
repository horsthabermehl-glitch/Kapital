<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kapitalvermögen · Michaela &amp; Horst</title>
<style>
  :root {
    --bg: #EEEBE2; --panel: #FFFFFF; --panelAlt: #F5F2EA;
    --border: #DDD8CB; --borderSoft: #E8E3D6;
    --ink: #20242C; --muted: #5B6270; --faint: #8B8579;
    --gold: #9C7A3E; --goldSoft: #B8935A; --rust: #A6432C; --sage: #4F7A52;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .serif { font-family: Georgia, "Times New Roman", serif; }
  ::selection { background: var(--goldSoft); color: #1A1D22; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 56px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 20px 22px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .panel-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .panel-subtitle { font-size: 12px; color: var(--faint); margin-top: 3px; }
  .stat-label { font-size: 10.5px; color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase; }
  .stat-value { font-family: Georgia, serif; font-size: 21px; font-weight: 600; font-variant-numeric: tabular-nums; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 7px 9px; font-size: 12.5px; }
  th { position: sticky; top: 0; background: var(--panelAlt); color: var(--muted); font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; font-size: 10px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:hover { background: var(--borderSoft); }
  th.sort-active { color: var(--gold); }
  tbody tr { border-bottom: 1px solid var(--borderSoft); }
  tbody tr:hover { background: rgba(0,0,0,0.03); }
  td input { background: transparent; border: 1px solid transparent; color: var(--ink); font-size: 12.5px;
    width: 100%; padding: 3px 5px; border-radius: 2px; font-variant-numeric: tabular-nums; font-family: inherit; }
  td input:hover { border-color: var(--borderSoft); }
  td input:focus { border-color: var(--goldSoft); outline: none; background: rgba(184,147,90,0.08); }
  .scrollbox { max-height: 460px; overflow-y: auto; border: 1px solid var(--border); border-radius: 3px; }
  button.pill { background: var(--panelAlt); border: 1px solid var(--border); color: var(--muted); font-size: 11.5px;
    padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all .15s; }
  button.pill:hover { border-color: var(--goldSoft); color: var(--ink); }
  button.pill.active { background: var(--goldSoft); color: #14171C; border-color: var(--goldSoft); font-weight: 600; }
  button.print-btn { background: transparent; border: 1px solid var(--goldSoft); color: var(--gold); font-size: 12px;
    padding: 8px 16px; border-radius: 3px; cursor: pointer; font-family: inherit; font-weight: 600; letter-spacing: 0.03em; }
  button.print-btn:hover { background: var(--goldSoft); color: #14171C; }
  select.filter, input.search { background: var(--panelAlt); border: 1px solid var(--border); color: var(--ink);
    font-size: 12px; padding: 6px 10px; border-radius: 3px; font-family: inherit; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .toolbar-sep { padding-top: 6px; border-top: 1px solid var(--borderSoft); }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .swatch { width: 9px; height: 9px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state h3 { font-family: Georgia, serif; font-size: 20px; color: var(--ink); margin-bottom: 8px; }

  .print-only { display: none; }
  @media print {
    @page { size: A4; margin: 16mm 14mm; }
    .screen-only { display: none !important; }
    .print-only { display: block !important; }
    .po-table { width: 100%; border-collapse: collapse; }
    .po-table th, .po-table td { padding: 6px 8px; font-size: 9.5px; text-align: left; }
    .po-table thead { display: table-header-group; }
    .po-table tr { page-break-inside: avoid; }
    .po-section { page-break-before: always; }
  }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="fileInput" accept="application/json,.json" style="display:none">

<script>
(function () {
  "use strict";

  /* =============================================================
     CONFIG / TOKENS
  ============================================================= */
  var T = {
    bg: "#EEEBE2", panel: "#FFFFFF", panelAlt: "#F5F2EA", border: "#DDD8CB", borderSoft: "#E8E3D6",
    textPrimary: "#20242C", textMuted: "#5B6270", textFaint: "#8B8579",
    gold: "#9C7A3E", goldSoft: "#B8935A", rust: "#A6432C", sage: "#4F7A52"
  };
  var ASSET_COLORS = {
    "Versicherung / Altersvorsorge": "#9B8AC4", "Gold (physisch)": "#C9A24A",
    "Festgeld / Termineinlagen": "#7396AC", "Anleihen": "#7FA37F",
    "Fonds / ETF": "#C97B63", "Liquidität / Tagesgeld": "#ACA695",
    "Einzelaktien": "#A75D5D", "Sonstiges": "#5B6270"
  };
  var INST_COLORS = {
    "Commerzbank": "#7396AC", "Sparkasse": "#B5563C", "Wüstenrot": "#7FA37F",
    "Allianz-Versicherung": "#9B8AC4", "Deutsche Bank": "#93989F", "Alte Leipziger": "#ACA695",
    "Eigenverwahrung (Gold)": "#C9A24A", "Nicht zugeordnet": "#454B56"
  };
  var STAND_DATUM_KEY = "kapitalvermoegen-standdatum-v1";
  var DEFAULT_STAND_DATUM = "2026-05-22";
  var STORAGE_KEY = "kapitalvermoegen-positionen-v1";
  var SNAPSHOT_KEY = "kapitalvermoegen-snapshots-v1";
  var TARGET_KEY = "kapitalvermoegen-zielallokation-v1";
  var OWNER_OPTIONS = ["Gemeinsam", "Horst", "Michaela"];
  var ASSET_CLASS_OPTIONS = Object.keys(ASSET_COLORS);
  var INSTITUTE_OPTIONS = Object.keys(INST_COLORS);

  // Positionen, deren Emittent identisch mit der depotführenden Stelle ist ("Eigenemission").
  var ISSUER_ALIASES = {
    "Commerzbank": ["commerzbank", "coba"],
    "Sparkasse": ["sparkassenbrief"],
    "Deutsche Bank": ["deutsche bank"]
  };

  var LIQUIDITY_TIERS = ["Sofort verfügbar", "Kurzfristig gebunden", "Mittelfristig gebunden", "Langfristig gebunden"];
  var LIQUIDITY_COLORS = {
    "Sofort verfügbar": "#7FA37F", "Kurzfristig gebunden": "#7396AC",
    "Mittelfristig gebunden": "#C9A24A", "Langfristig gebunden": "#9B8AC4"
  };
  function classifyLiquidity(p, standDate) {
    if (p.assetClass === "Liquidität / Tagesgeld") return "Sofort verfügbar";
    if (p.assetClass === "Festgeld / Termineinlagen") {
      if (!p.faelligkeit) return "Mittelfristig gebunden";
      var days = (new Date(p.faelligkeit) - standDate) / 86400000;
      return days <= 92 ? "Kurzfristig gebunden" : "Mittelfristig gebunden";
    }
    if (p.assetClass === "Versicherung / Altersvorsorge") return "Langfristig gebunden";
    return "Mittelfristig gebunden";
  }

  // Keine echten Positionsdaten im Quelltext (dieses File landet in einem Git-Repo).
  // Reale Werte werden ausschließlich lokal über "Backup importieren" eingespielt und
  // in localStorage dieses Browsers gehalten — nie im Repository.
  var DEFAULT_POSITIONS = [];

  var DEMO_POSITIONS = [
    { id: 1, label: "Girokonto (Beispiel)", institut: "Musterbank", assetClass: "Liquidität / Tagesgeld", owner: "Gemeinsam", saldo: 12000, zins: 0, faelligkeit: null, zinsen: null, nummer: null, ak: null },
    { id: 2, label: "Festgeld (Beispiel)", institut: "Musterbank", assetClass: "Festgeld / Termineinlagen", owner: "Gemeinsam", saldo: 40000, zins: 0.025, faelligkeit: "2027-06-01", zinsen: 1000, nummer: null, ak: 40000 },
    { id: 3, label: "Unternehmensanleihe (Beispiel)", institut: "Musterbank", assetClass: "Anleihen", owner: "Gemeinsam", saldo: 25000, zins: 0.03, faelligkeit: "2029-01-01", zinsen: 750, nummer: null, ak: 24200 },
    { id: 4, label: "Aktienfonds (Beispiel)", institut: "Musterbank", assetClass: "Fonds / ETF", owner: "Gemeinsam", saldo: 30000, zins: null, faelligkeit: null, zinsen: null, nummer: null, ak: 22500 },
    { id: 5, label: "Rentenversicherung (Beispiel)", institut: "Musterversicherung", assetClass: "Versicherung / Altersvorsorge", owner: "Horst", saldo: 20000, zins: null, faelligkeit: "2035-01-01", zinsen: null, nummer: null, ak: 18000 },
    { id: 6, label: "Gold 250g (Beispiel)", institut: "Eigenverwahrung (Gold)", assetClass: "Gold (physisch)", owner: "Gemeinsam", saldo: 18000, zins: null, faelligkeit: "2023-01-15", zinsen: null, nummer: null, ak: 12500 }
  ];

  /* =============================================================
     STATE
  ============================================================= */
  var STATE = {
    positions: loadPositions(),
    search: "", filterInst: "Alle", filterClass: "Alle",
    sortKey: "saldo", sortDir: "desc",
    saveNote: "",
    snapshots: loadSnapshots(),
    targetAlloc: loadTarget(),
    standDatum: loadStandDatum()
  };

  function migratePositions(arr) {
    return arr.map(function (p) {
      if (p.ak === undefined || p.ak === null) {
        var parsed = p.assetClass === "Gold (physisch)" ? parseAK(p.label) : null;
        p.ak = parsed !== null && parsed !== undefined ? parsed : null;
      }
      return p;
    });
  }

  function loadPositions() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr)) return migratePositions(arr);
      }
    } catch (e) { /* localStorage nicht verfügbar oder Daten defekt */ }
    return migratePositions(DEFAULT_POSITIONS.slice());
  }

  function loadSnapshots() {
    try {
      var raw = localStorage.getItem(SNAPSHOT_KEY);
      if (raw) { var arr = JSON.parse(raw); if (Array.isArray(arr)) return arr; }
    } catch (e) { /* keine Snapshots */ }
    return [];
  }
  function persistSnapshots() {
    try { localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(STATE.snapshots)); } catch (e) { /* ignore */ }
  }

  function loadTarget() {
    try {
      var raw = localStorage.getItem(TARGET_KEY);
      if (raw) { var obj = JSON.parse(raw); if (obj && typeof obj === "object") return obj; }
    } catch (e) { /* keine Zielallokation gesetzt */ }
    return {};
  }
  function persistTarget() {
    try { localStorage.setItem(TARGET_KEY, JSON.stringify(STATE.targetAlloc)); } catch (e) { /* ignore */ }
  }

  function loadStandDatum() {
    try {
      var raw = localStorage.getItem(STAND_DATUM_KEY);
      if (raw) return raw;
    } catch (e) { /* kein gespeichertes Stand-Datum */ }
    return DEFAULT_STAND_DATUM;
  }
  function updateStandDatum(value) {
    STATE.standDatum = value;
    try { localStorage.setItem(STAND_DATUM_KEY, value); } catch (e) { /* ignore */ }
    render();
  }

  function saveSnapshot() {
    var agg = computeAll(STATE.positions);
    var todayKey = new Date().toISOString().slice(0, 10);
    var byClassObj = {};
    agg.byClass.forEach(function (c) { byClassObj[c.name] = c.value; });
    STATE.snapshots = STATE.snapshots.filter(function (s) { return s.date !== todayKey; });
    STATE.snapshots.push({ date: todayKey, total: agg.total, byClass: byClassObj });
    STATE.snapshots.sort(function (a, b) { return a.date.localeCompare(b.date); });
    persistSnapshots();
    flashNote("Snapshot gespeichert");
    render();
  }

  function deleteSnapshot(date) {
    STATE.snapshots = STATE.snapshots.filter(function (s) { return s.date !== date; });
    persistSnapshots();
    render();
  }

  function updateTarget(assetClass, value) {
    STATE.targetAlloc[assetClass] = value;
    persistTarget();
    render();
  }

  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE.positions));
      flashNote("Gespeichert");
    } catch (e) {
      flashNote("Speichern fehlgeschlagen");
    }
  }

  var flashTimer = null;
  function flashNote(msg) {
    STATE.saveNote = msg;
    renderSaveNoteOnly();
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function () { STATE.saveNote = ""; renderSaveNoteOnly(); }, 1800);
  }
  function renderSaveNoteOnly() {
    var el = document.getElementById("saveNote");
    if (el) el.textContent = STATE.saveNote;
  }

  /* =============================================================
     FORMATTING HELPERS
  ============================================================= */
  function eur(n, digits) {
    digits = digits === undefined ? 0 : digits;
    return new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR", minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n || 0);
  }
  function eur0(n) { return eur(n, 0); }
  function pct(n, digits) {
    digits = digits === undefined ? 1 : digits;
    if (n === null || n === undefined || isNaN(n)) return "–";
    return (n * 100).toFixed(digits).replace(".", ",") + " %";
  }
  function num(n) { return new Intl.NumberFormat("de-DE").format(n); }
  function dateDe(iso) { return iso ? iso.split("-").reverse().join(".") : "–"; }
  function escapeHtml(s) {
    return String(s === null || s === undefined ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function parseAK(label) {
    var m = /([\d.]+,\d+)\s*EUR/.exec(label || "");
    return m ? parseFloat(m[1].replace(/\./g, "").replace(",", ".")) : null;
  }

  // Parses both German (1.234,56) and plain (1234.56) typed number formats.
  function parseFlexibleNumber(str) {
    str = String(str == null ? "" : str).trim();
    if (!str) return null;
    var hasComma = str.indexOf(",") !== -1;
    var hasDot = str.indexOf(".") !== -1;
    if (hasComma && hasDot) str = str.replace(/\./g, "").replace(",", ".");
    else if (hasComma && !hasDot) str = str.replace(",", ".");
    str = str.replace(/[^0-9.\-]/g, "");
    var val = parseFloat(str);
    return isNaN(val) ? null : val;
  }

  // Parses a date typed as "TT.MM.JJJJ" into ISO (YYYY-MM-DD). Empty input clears the date.
  // Returns { valid: true, iso: string|null } or { valid: false }.
  function parseGermanDate(str) {
    str = String(str == null ? "" : str).trim();
    if (!str) return { valid: true, iso: null };
    var m = /^(\d{1,2})\.(\d{1,2})\.(\d{4})$/.exec(str);
    if (!m) return { valid: false };
    var day = parseInt(m[1], 10), month = parseInt(m[2], 10), year = parseInt(m[3], 10);
    if (month < 1 || month > 12 || day < 1 || day > 31) return { valid: false };
    var iso = String(year).padStart(4, "0") + "-" + String(month).padStart(2, "0") + "-" + String(day).padStart(2, "0");
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d.getTime()) || d.getFullYear() !== year || d.getMonth() + 1 !== month || d.getDate() !== day) return { valid: false };
    return { valid: true, iso: iso };
  }

  /* =============================================================
     AGGREGATES
  ============================================================= */
  function groupSum(positions, key) {
    var m = {}, order = [];
    positions.forEach(function (p) {
      var k = p[key];
      if (!(k in m)) { m[k] = 0; order.push(k); }
      m[k] += p.saldo;
    });
    return order.map(function (name) { return { name: name, value: m[name] }; })
      .sort(function (a, b) { return b.value - a.value; });
  }

  function computeAll(positions) {
    var total = positions.reduce(function (s, p) { return s + (Number(p.saldo) || 0); }, 0);
    var byClass = groupSum(positions, "assetClass");
    var byInst = groupSum(positions, "institut");
    var byOwner = groupSum(positions, "owner");
    var hhi = total ? byInst.reduce(function (s, i) { return s + Math.pow((i.value / total) * 100, 2); }, 0) : 0;

    var rated = positions.filter(function (p) { return p.zins !== null && p.zins !== undefined; });
    var base = rated.reduce(function (s, p) { return s + p.saldo; }, 0);
    var weightedRate = base ? rated.reduce(function (s, p) { return s + p.saldo * p.zins; }, 0) / base : 0;

    var totalInterest = positions.reduce(function (s, p) {
      if (p.zinsen !== null && p.zinsen !== undefined) return s + p.zinsen;
      if (p.zins !== null && p.zins !== undefined) return s + p.saldo * p.zins;
      return s;
    }, 0);

    var gold = positions.filter(function (p) { return p.assetClass === "Gold (physisch)"; });
    var goldValue = gold.reduce(function (s, p) { return s + p.saldo; }, 0);
    var goldAK = gold.reduce(function (s, p) { return s + (p.ak || 0); }, 0);

    var withDate = positions.filter(function (p) { return p.faelligkeit; });
    var years = [];
    withDate.forEach(function (p) { var y = p.faelligkeit.slice(0, 4); if (years.indexOf(y) === -1) years.push(y); });
    years.sort();
    var maturityClasses = [];
    withDate.forEach(function (p) { if (maturityClasses.indexOf(p.assetClass) === -1) maturityClasses.push(p.assetClass); });
    var maturityTimeline = years.map(function (y) {
      var row = { year: y };
      maturityClasses.forEach(function (c) {
        row[c] = withDate.filter(function (p) { return p.faelligkeit.slice(0, 4) === y && p.assetClass === c; })
          .reduce(function (s, p) { return s + p.saldo; }, 0);
      });
      return row;
    });

    // Steuer-Ampel Gold: physisches Gold ist nach § 23 EStG nach 1 Jahr Haltefrist steuerfrei.
    var today = new Date();
    var goldLots = gold.map(function (p) {
      if (!p.faelligkeit) return Object.assign({}, p, { taxStatus: "unbekannt", taxFreeDate: null });
      var purchase = new Date(p.faelligkeit);
      var taxFree = new Date(purchase); taxFree.setFullYear(taxFree.getFullYear() + 1);
      var daysLeft = Math.ceil((taxFree - today) / 86400000);
      var taxStatus = daysLeft <= 0 ? "steuerfrei" : (daysLeft <= 60 ? "bald" : "pflichtig");
      return Object.assign({}, p, { taxStatus: taxStatus, taxFreeDate: taxFree.toISOString().slice(0, 10) });
    }).sort(function (a, b) { return (a.faelligkeit || "9999").localeCompare(b.faelligkeit || "9999"); });

    // Emittentenrisiko: Eigenemissionen der depotführenden Stelle
    var issuerRisk = byInst.map(function (i) {
      var aliases = ISSUER_ALIASES[i.name] || [];
      var ownIssuance = positions.filter(function (p) {
        return p.institut === i.name && aliases.some(function (a) { return (p.label || "").toLowerCase().indexOf(a) !== -1; });
      }).reduce(function (s, p) { return s + p.saldo; }, 0);
      return { name: i.name, custody: i.value, ownIssuance: ownIssuance };
    }).filter(function (i) { return i.ownIssuance > 0; });

    // Liquiditätsstufen
    var liqMap = {};
    positions.forEach(function (p) {
      var tier = classifyLiquidity(p, today);
      liqMap[tier] = (liqMap[tier] || 0) + p.saldo;
    });
    var liquidityBreakdown = LIQUIDITY_TIERS.map(function (t) { return { name: t, value: liqMap[t] || 0 }; }).filter(function (t) { return t.value > 0; });

    // Zielallokation / Rebalancing
    var rebalancing = byClass.map(function (c) {
      var actualPct = total ? (c.value / total) * 100 : 0;
      var target = STATE.targetAlloc[c.name] !== undefined ? STATE.targetAlloc[c.name] : Math.round(actualPct * 10) / 10;
      var targetValue = (target / 100) * total;
      return { name: c.name, actualPct: actualPct, actualValue: c.value, targetPct: target, targetValue: targetValue, delta: targetValue - c.value };
    });
    var targetPctSum = rebalancing.reduce(function (s, r) { return s + r.targetPct; }, 0);

    // Gesamtperformance über alle Positionen mit erfasstem Anschaffungsbetrag
    var withAK = positions.filter(function (p) { return p.ak !== null && p.ak !== undefined && p.ak > 0; });
    var akSum = withAK.reduce(function (s, p) { return s + p.ak; }, 0);
    var akCurrentValue = withAK.reduce(function (s, p) { return s + p.saldo; }, 0);
    var overallPerformance = akSum ? (akCurrentValue - akSum) / akSum : null;

    return {
      total: total, byClass: byClass, byInst: byInst, byOwner: byOwner, hhi: hhi,
      weightedRate: weightedRate, weightedBase: base, totalInterest: totalInterest,
      gold: { count: gold.length, value: goldValue, ak: goldAK, gain: goldValue - goldAK },
      maturityTimeline: maturityTimeline, maturityClasses: maturityClasses,
      goldLots: goldLots, issuerRisk: issuerRisk, liquidityBreakdown: liquidityBreakdown,
      rebalancing: rebalancing, targetPctSum: targetPctSum,
      performance: { count: withAK.length, ak: akSum, value: akCurrentValue, fraction: overallPerformance }
    };
  }

  function performanceFraction(p) {
    if (p.ak === null || p.ak === undefined || p.ak === 0) return null;
    return (p.saldo - p.ak) / p.ak;
  }

  function filteredSortedPositions() {
    var rows = STATE.positions.filter(function (p) {
      if (STATE.filterInst !== "Alle" && p.institut !== STATE.filterInst) return false;
      if (STATE.filterClass !== "Alle" && p.assetClass !== STATE.filterClass) return false;
      if (STATE.search) {
        var hay = (p.label + " " + p.institut + " " + p.assetClass).toLowerCase();
        if (hay.indexOf(STATE.search.toLowerCase()) === -1) return false;
      }
      return true;
    });
    rows.sort(function (a, b) {
      if (STATE.sortKey === "performance") {
        var pa = performanceFraction(a), pb = performanceFraction(b);
        pa = pa === null ? -Infinity : pa; pb = pb === null ? -Infinity : pb;
        return STATE.sortDir === "asc" ? pa - pb : pb - pa;
      }
      var av = a[STATE.sortKey], bv = b[STATE.sortKey];
      if (typeof av === "string" || typeof bv === "string") {
        av = av || ""; bv = bv || "";
        return STATE.sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      av = av || 0; bv = bv || 0;
      return STATE.sortDir === "asc" ? av - bv : bv - av;
    });
    return rows;
  }

  /* =============================================================
     SVG CHARTS (dependency-free)
  ============================================================= */
  function donutSVG(data, total, size) {
    if (!total || !data.length) {
      return '<div style="width:' + size + 'px;height:' + size + 'px;display:flex;align-items:center;justify-content:center;color:' + T.textFaint + ';font-size:12px;border:1px dashed ' + T.border + ';border-radius:50%;">keine Daten</div>';
    }
    var cx = size / 2, cy = size / 2, r = size / 2 - 6, ir = r * 0.56;
    var angle = -90, paths = [];
    data.forEach(function (d) {
      var frac = d.value / total;
      var sweep = Math.min(frac * 360, 359.99);
      var large = sweep > 180 ? 1 : 0;
      var a1 = angle * Math.PI / 180, a2 = (angle + sweep) * Math.PI / 180;
      var x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      var x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      var ix1 = cx + ir * Math.cos(a2), iy1 = cy + ir * Math.sin(a2);
      var ix2 = cx + ir * Math.cos(a1), iy2 = cy + ir * Math.sin(a1);
      var color = ASSET_COLORS[d.name] || T.textFaint;
      paths.push('<path d="M ' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' +
        x2.toFixed(2) + ' ' + y2.toFixed(2) + ' L ' + ix1.toFixed(2) + ' ' + iy1.toFixed(2) + ' A ' + ir + ' ' + ir +
        ' 0 ' + large + ' 0 ' + ix2.toFixed(2) + ' ' + iy2.toFixed(2) + ' Z" fill="' + color + '" stroke="' + T.panel + '" stroke-width="2">' +
        '<title>' + escapeHtml(d.name) + ': ' + eur0(d.value) + '</title></path>');
      angle += sweep;
    });
    return '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' + paths.join("") +
      '<text x="' + cx + '" y="' + (cy - 6) + '" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="' + T.textPrimary + '">' + eur0(total) + '</text>' +
      '<text x="' + cx + '" y="' + (cy + 14) + '" text-anchor="middle" font-size="9" fill="' + T.textMuted + '">Gesamtvermögen</text></svg>';
  }

  function maturityBarsSVG(rows, classes, width, height) {
    if (!rows.length) {
      return '<div style="height:' + height + 'px;display:flex;align-items:center;justify-content:center;color:' + T.textFaint + ';font-size:12px;">keine Fälligkeiten hinterlegt</div>';
    }
    var pad = { top: 10, right: 10, bottom: 24, left: 46 };
    var innerW = width - pad.left - pad.right, innerH = height - pad.top - pad.bottom;
    var maxVal = 1;
    rows.forEach(function (r) {
      var sum = classes.reduce(function (s, c) { return s + (r[c] || 0); }, 0);
      if (sum > maxVal) maxVal = sum;
    });
    var gap = innerW / rows.length, barW = gap * 0.6;
    var bars = [], ticks = [], xLabels = [];
    [0, 0.5, 1].forEach(function (f) {
      var val = maxVal * f, y = pad.top + innerH - f * innerH;
      ticks.push('<line x1="' + pad.left + '" x2="' + (width - pad.right) + '" y1="' + y.toFixed(1) + '" y2="' + y.toFixed(1) + '" stroke="' + T.borderSoft + '" stroke-width="1"/>');
      ticks.push('<text x="' + (pad.left - 6) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end" font-size="8" fill="' + T.textMuted + '">' + (val / 1000).toFixed(0) + 'k</text>');
    });
    rows.forEach(function (r, i) {
      var yCum = 0;
      var x = pad.left + i * gap + (gap - barW) / 2;
      classes.forEach(function (c) {
        var v = r[c] || 0;
        if (!v) return;
        var h = (v / maxVal) * innerH;
        var y = pad.top + innerH - yCum - h;
        var color = ASSET_COLORS[c] || T.textFaint;
        bars.push('<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + h.toFixed(1) + '" fill="' + color + '"><title>' + escapeHtml(c) + ' ' + r.year + ': ' + eur0(v) + '</title></rect>');
        yCum += h;
      });
      xLabels.push('<text x="' + (x + barW / 2).toFixed(1) + '" y="' + (height - 6) + '" text-anchor="middle" font-size="8" fill="' + T.textMuted + '">' + r.year + '</text>');
    });
    return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="' + height + '">' + ticks.join("") + bars.join("") + xLabels.join("") + '</svg>';
  }

  function lineChartSVG(snapshots, width, height) {
    var pad = { top: 10, right: 14, bottom: 22, left: 46 };
    var innerW = width - pad.left - pad.right, innerH = height - pad.top - pad.bottom;
    var vals = snapshots.map(function (s) { return s.total; });
    var maxVal = Math.max.apply(null, vals), minVal = Math.min.apply(null, vals);
    if (maxVal === minVal) { maxVal = maxVal + 1; minVal = Math.max(0, minVal - 1); }
    var n = snapshots.length;
    var pts = snapshots.map(function (s, i) {
      var x = pad.left + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
      var y = pad.top + innerH - ((s.total - minVal) / (maxVal - minVal)) * innerH;
      return { x: x, y: y, s: s };
    });
    var pathD = pts.map(function (p, i) { return (i === 0 ? "M " : "L ") + p.x.toFixed(1) + " " + p.y.toFixed(1); }).join(" ");
    var ticks = [0, 0.5, 1].map(function (f) {
      var val = minVal + (maxVal - minVal) * f, y = pad.top + innerH - f * innerH;
      return '<line x1="' + pad.left + '" x2="' + (width - pad.right) + '" y1="' + y.toFixed(1) + '" y2="' + y.toFixed(1) + '" stroke="' + T.borderSoft + '" stroke-width="1"/>' +
        '<text x="' + (pad.left - 6) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end" font-size="8" fill="' + T.textMuted + '">' + (val / 1000).toFixed(0) + 'k</text>';
    }).join("");
    var xLabels = pts.map(function (p) {
      return '<text x="' + p.x.toFixed(1) + '" y="' + (height - 6) + '" text-anchor="middle" font-size="8" fill="' + T.textMuted + '">' + dateDe(p.s.date) + '</text>';
    }).join("");
    var dots = pts.map(function (p) {
      return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="' + T.gold + '"><title>' + dateDe(p.s.date) + ': ' + eur0(p.s.total) + '</title></circle>';
    }).join("");
    return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="' + height + '">' + ticks +
      '<path d="' + pathD + '" fill="none" stroke="' + T.gold + '" stroke-width="2.5"/>' + dots + xLabels + '</svg>';
  }

  /* =============================================================
     MUTATIONS
  ============================================================= */
  function updatePosition(id, field, value) {
    var p = STATE.positions.find(function (p) { return p.id === id; });
    if (!p) return;
    p[field] = value;
    persist();
  }

  function addPosition() {
    var nextId = STATE.positions.reduce(function (m, p) { return Math.max(m, p.id); }, 0) + 1;
    STATE.positions.push({
      id: nextId, label: "Neue Position", nummer: "", institut: "Sparkasse",
      assetClass: "Liquidität / Tagesgeld", owner: "Gemeinsam",
      saldo: 0, zins: null, faelligkeit: null, zinsen: null, markiert: false, ak: null
    });
    persist();
    STATE.sortKey = "id"; STATE.sortDir = "desc";
    STATE.filterInst = "Alle"; STATE.filterClass = "Alle"; STATE.search = "";
    render();
  }

  function deletePosition(id) {
    var p = STATE.positions.find(function (p) { return p.id === id; });
    if (!p) return;
    if (!confirm('"' + p.label + '" wirklich löschen?')) return;
    STATE.positions = STATE.positions.filter(function (p) { return p.id !== id; });
    persist();
    render();
  }

  function resetData() {
    if (!confirm("Alle Positionen löschen und auf leeren Ausgangszustand zurücksetzen?")) return;
    STATE.positions = [];
    persist();
    render();
  }

  function loadDemo() {
    if (STATE.positions.length && !confirm("Beispieldaten laden? Der aktuelle Stand im Tool wird überschrieben.")) return;
    STATE.positions = JSON.parse(JSON.stringify(DEMO_POSITIONS));
    persist();
    render();
  }

  function downloadBlob(content, filename, mime) {
    var blob = new Blob([content], { type: mime });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function exportBackup() {
    var payload = { exportedAt: new Date().toISOString(), standDatum: STATE.standDatum, version: 1, positions: STATE.positions };
    var dateStr = new Date().toISOString().slice(0, 10);
    downloadBlob(JSON.stringify(payload, null, 2), "Kapitalvermoegen-Backup-" + dateStr + ".json", "application/json");
    flashNote("Backup heruntergeladen");
  }

  function exportCSV() {
    var headers = ["Bezeichnung", "Institut", "Anlageklasse", "Eigentümer", "Saldo", "Zins", "Fälligkeit", "Nummer"];
    function esc(v) { return '"' + String(v === null || v === undefined ? "" : v).replace(/"/g, '""') + '"'; }
    var rows = STATE.positions.map(function (p) {
      return [p.label, p.institut, p.assetClass, p.owner,
        String(p.saldo).replace(".", ","),
        (p.zins !== null && p.zins !== undefined) ? String(p.zins).replace(".", ",") : "",
        p.faelligkeit || "", p.nummer || ""].map(esc).join(";");
    });
    var csv = "\uFEFF" + [headers.map(esc).join(";")].concat(rows).join("\r\n");
    var dateStr = new Date().toISOString().slice(0, 10);
    downloadBlob(csv, "Kapitalvermoegen-Export-" + dateStr + ".csv", "text/csv;charset=utf-8;");
    flashNote("CSV heruntergeladen");
  }

  function importBackup(file) {
    var reader = new FileReader();
    reader.onload = function (evt) {
      try {
        var parsed = JSON.parse(evt.target.result);
        var arr = Array.isArray(parsed) ? parsed : parsed.positions;
        if (!Array.isArray(arr) || arr.length === 0) throw new Error("leer");
        var valid = arr.every(function (p) { return p && typeof p.saldo === "number" && typeof p.label === "string"; });
        if (!valid) throw new Error("Struktur");
        if (!confirm(arr.length + " Positionen aus dieser Datei importieren? Der aktuelle Stand im Tool wird überschrieben.")) return;
        STATE.positions = migratePositions(arr);
        persist();
        render();
      } catch (err) {
        flashNote("Import fehlgeschlagen — ungültige Datei");
      }
    };
    reader.readAsText(file);
  }

  function renderInner() {
    var agg = computeAll(STATE.positions);
    var app = document.getElementById("app");
    app.innerHTML = renderScreen(agg) + renderPrintOnly(agg);
    wireEvents(agg);
  }

  // Every render preserves scroll position and refocuses whatever was focused
  // (matched by id, or by data-id+data-field for table cells that share ids).
  function render() {
    var active = document.activeElement;
    var id = active && active.id;
    var dataId = active && active.getAttribute && active.getAttribute("data-id");
    var dataField = active && active.getAttribute && active.getAttribute("data-field");
    var selStart = null, selEnd = null;
    try { selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null; selEnd = active && active.selectionEnd; } catch (e) { /* manche Input-Typen (z.B. date) erlauben das nicht */ }

    var scrollBox = document.querySelector(".scrollbox");
    var scrollTop = scrollBox ? scrollBox.scrollTop : null;
    var pageScroll = window.scrollY;

    renderInner();

    var el = null;
    if (dataId !== null && dataId !== undefined && dataField) {
      el = document.querySelector('[data-id="' + dataId + '"][data-field="' + dataField + '"]');
    } else if (id) {
      el = document.getElementById(id);
    }
    if (el) {
      el.focus({ preventScroll: true });
      if (selStart !== null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) { /* ignore, z.B. bei type=date/number */ }
      }
    }
    var scrollBox2 = document.querySelector(".scrollbox");
    if (scrollBox2 && scrollTop !== null) scrollBox2.scrollTop = scrollTop;
    window.scrollTo(0, pageScroll);
  }

  function statChip(label, value, color) {

  }

    arr.forEach(function (v) { if (!(v in seen)) { seen[v] = true; out.push(v); } });

  }

      agg.rebalancing.map(function (r, idx) {
        return '<tr>' + td(escapeHtml(r.name), idx) + td(r.actualPct.toFixed(1).replace(".", ",") + ' %', idx, "right") + td(eur0(r.actualValue), idx, "right") +
          td(r.targetPct.toFixed(1).replace(".", ",") + ' %', idx, "right") + td((r.delta > 1 ? "+" : "") + eur0(r.delta), idx, "right") + '</tr>';
      }).join("") + '</tbody></table></div>';

    html += '<div class="po-section"><h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Anhang: Einzelpositionen</h3>' +
      '<p style="font-size:9.5px;color:' + PM + ';font-style:italic;margin:8px 0 10px;">Sortiert nach Saldo absteigend, ' + STATE.positions.length + ' Positionen, Stand ' + dateDe(STATE.standDatum) + '.</p>' +
      '<table class="po-table"><thead><tr>' + th("Bezeichnung") + th("Nummer") + th("Institut") + th("Anlageklasse") + th("Saldo", "right") + th("Zins", "right") + th("Fälligkeit") + '</tr></thead><tbody>' +
      STATE.positions.slice().sort(function (a, b) { return b.saldo - a.saldo; }).map(function (p, i) {
        return '<tr>' + td(escapeHtml(p.label), i) + td(escapeHtml(p.nummer || "–"), i) + td(escapeHtml(p.institut), i) + td(escapeHtml(p.assetClass.replace(" / ", "/")), i) +
          td(eur(p.saldo, 2), i, "right") + td((p.zins !== null && p.zins !== undefined) ? pct(p.zins, 2) : "–", i, "right") + td(dateDe(p.faelligkeit), i) + '</tr>';
      }).join("") + '</tbody></table></div>';

    html += '<p style="font-size:9px;color:' + PM + ';font-style:italic;line-height:1.6;margin-top:18px;">Hinweise: „Nicht zugeordnet" bezeichnet Positionen ohne im Datenblatt vermerktes depotführendes Institut. ' +
      'Zinserträge sind kalkulatorisch und berücksichtigen keine Steuern oder Abgeltungssteuer. Kursgewinne bei Fonds, ETFs und Einzelaktien sind nicht enthalten. Alle Angaben ohne Gewähr.</p>';
    html += '</div>';
    return html;
  }

  /* =============================================================
     EVENTS
  ============================================================= */
  function wireEvents() {
    var printBtn = document.getElementById("printBtn");
    if (printBtn) printBtn.addEventListener("click", function () { window.print(); });

    var standDatumInput = document.getElementById("standDatumInput");
    if (standDatumInput) standDatumInput.addEventListener("change", function (e) {
      var parsed = parseGermanDate(e.target.value);
      if (!parsed.valid || !parsed.iso) {
        flashNote("Ungültiges Datum — bitte TT.MM.JJJJ");
        render();
        return;
      }
      updateStandDatum(parsed.iso);
    });

    var snapshotBtn = document.getElementById("snapshotBtn");
    if (snapshotBtn) snapshotBtn.addEventListener("click", saveSnapshot);

    var screenRoot = document.querySelector(".screen-only");
    if (screenRoot) {
      screenRoot.addEventListener("click", function (e) {
        var delSnap = e.target.closest("button[data-delsnap]");
        if (delSnap) deleteSnapshot(delSnap.getAttribute("data-delsnap"));
      });
      screenRoot.addEventListener("change", function (e) {
        var targetInput = e.target.closest("input[data-target]");
        if (targetInput) updateTarget(targetInput.getAttribute("data-target"), parseFloat(targetInput.value) || 0);
      });
    }

    var demoBtn = document.getElementById("demoBtn");
    if (demoBtn) demoBtn.addEventListener("click", loadDemo);

    var importBtnEmpty = document.getElementById("importBtnEmpty");
    if (importBtnEmpty) importBtnEmpty.addEventListener("click", function () { document.getElementById("fileInput").click(); });

    var searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.addEventListener("input", function (e) {
      STATE.search = e.target.value;
      render();
    });

    var filterInst = document.getElementById("filterInst");
    if (filterInst) filterInst.addEventListener("change", function (e) { STATE.filterInst = e.target.value; render(); });

    var filterClass = document.getElementById("filterClass");
    if (filterClass) filterClass.addEventListener("change", function (e) { STATE.filterClass = e.target.value; render(); });

    var addBtn = document.getElementById("addBtn");
    if (addBtn) addBtn.addEventListener("click", addPosition);



    var resetBtn = document.getElementById("resetBtn");
    if (resetBtn) resetBtn.addEventListener("click", resetData);

    var exportBackupBtn = document.getElementById("exportBackupBtn");
    if (exportBackupBtn) exportBackupBtn.addEventListener("click", exportBackup);

    var exportCsvBtn = document.getElementById("exportCsvBtn");
    if (exportCsvBtn) exportCsvBtn.addEventListener("click", exportCSV);

    var importBackupBtn = document.getElementById("importBackupBtn");
    if (importBackupBtn) importBackupBtn.addEventListener("click", function () { document.getElementById("fileInput").click(); });

    // sortable headers (event delegation)
    var thead = document.querySelector("#positionsTable thead");
    if (thead) thead.addEventListener("click", function (e) {
      var th = e.target.closest("th[data-sort]");
      if (!th) return;
      var key = th.getAttribute("data-sort");
      if (STATE.sortKey === key) STATE.sortDir = STATE.sortDir === "asc" ? "desc" : "asc";
      else { STATE.sortKey = key; STATE.sortDir = "desc"; }
      render();
    });

    // editable cells + delete buttons (event delegation)
    var tbody = document.querySelector("#positionsTable tbody");
    if (tbody) {
      // Currency/percent fields: show the raw editable number while focused.
      tbody.addEventListener("focusin", function (e) {
        var input = e.target.closest("input[data-kind]");
        if (!input) return;
        var id = Number(input.getAttribute("data-id"));
        var p = STATE.positions.find(function (p) { return p.id === id; });
        if (!p) return;
        var kind = input.getAttribute("data-kind");
        var field = input.getAttribute("data-field");
        if (kind === "currency") input.value = (p[field] === null || p[field] === undefined) ? "" : String(p[field]);
        else if (kind === "percent") input.value = (p.zins === null || p.zins === undefined) ? "" : String(p.zins * 100);
        requestAnimationFrame(function () { input.select(); });
      });

      tbody.addEventListener("change", function (e) {
        var target = e.target.closest("[data-id]");
        if (!target) return;
        var id = Number(target.getAttribute("data-id"));
        var field = target.getAttribute("data-field");
        var kind = target.getAttribute("data-kind");
        var value = target.value;
        if (kind === "checkbox") {
          value = target.checked;
        } else if (kind === "currency") {
          var cv = parseFlexibleNumber(value);
          value = cv === null ? 0 : cv;
        } else if (kind === "percent") {
          if (value === "") { value = null; }
          else { var pv = parseFlexibleNumber(value); value = pv === null ? null : pv / 100; }
        } else if (kind === "date") {
          var parsedDate = parseGermanDate(value);
          if (!parsedDate.valid) {
            flashNote("Ungültiges Datum — bitte TT.MM.JJJJ");
            render();
            return;
          }
          value = parsedDate.iso;
        }
        updatePosition(id, field, value);
        render();
      });
      tbody.addEventListener("click", function (e) {
        var btn = e.target.closest("button[data-del]");
        if (!btn) return;
        deletePosition(Number(btn.getAttribute("data-del")));
      });
    }
  }

  document.getElementById("fileInput").addEventListener("change", function (e) {
    var file = e.target.files && e.target.files[0];
    if (file) importBackup(file);
    e.target.value = "";
  });

  render();
})();
</script>
</body>
</html>
