<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kapitalvermögen · Michaela &amp; Horst</title>
<style>
  :root {
    --bg: #EEEBE2; --panel: #FFFFFF; --panelAlt: #F5F2EA;
    --border: #DDD8CB; --borderSoft: #E8E3D6;
    --ink: #20242C; --muted: #5B6270; --faint: #8B8579;
    --gold: #9C7A3E; --goldSoft: #B8935A; --rust: #A6432C; --sage: #4F7A52;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .serif { font-family: Georgia, "Times New Roman", serif; }
  ::selection { background: var(--goldSoft); color: #1A1D22; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 56px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 20px 22px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .panel-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .panel-subtitle { font-size: 12px; color: var(--faint); margin-top: 3px; }
  .stat-label { font-size: 10.5px; color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase; }
  .stat-value { font-family: Georgia, serif; font-size: 21px; font-weight: 600; font-variant-numeric: tabular-nums; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 7px 9px; font-size: 12.5px; }
  th { position: sticky; top: 0; background: var(--panelAlt); color: var(--muted); font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase; font-size: 10px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:hover { background: var(--borderSoft); }
  th.sort-active { color: var(--gold); }
  tbody tr { border-bottom: 1px solid var(--borderSoft); }
  tbody tr:hover { background: rgba(0,0,0,0.03); }
  td input { background: transparent; border: 1px solid transparent; color: var(--ink); font-size: 12.5px;
    width: 100%; padding: 3px 5px; border-radius: 2px; font-variant-numeric: tabular-nums; font-family: inherit; }
  td input:hover { border-color: var(--borderSoft); }
  td input:focus { border-color: var(--goldSoft); outline: none; background: rgba(184,147,90,0.08); }
  .scrollbox { max-height: 460px; overflow-y: auto; border: 1px solid var(--border); border-radius: 3px; }
  button.pill { background: var(--panelAlt); border: 1px solid var(--border); color: var(--muted); font-size: 11.5px;
    padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all .15s; }
  button.pill:hover { border-color: var(--goldSoft); color: var(--ink); }
  button.pill.active { background: var(--goldSoft); color: #14171C; border-color: var(--goldSoft); font-weight: 600; }
  button.print-btn { background: transparent; border: 1px solid var(--goldSoft); color: var(--gold); font-size: 12px;
    padding: 8px 16px; border-radius: 3px; cursor: pointer; font-family: inherit; font-weight: 600; letter-spacing: 0.03em; }
  button.print-btn:hover { background: var(--goldSoft); color: #14171C; }
  select.filter, input.search { background: var(--panelAlt); border: 1px solid var(--border); color: var(--ink);
    font-size: 12px; padding: 6px 10px; border-radius: 3px; font-family: inherit; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .toolbar-sep { padding-top: 6px; border-top: 1px solid var(--borderSoft); }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .swatch { width: 9px; height: 9px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state h3 { font-family: Georgia, serif; font-size: 20px; color: var(--ink); margin-bottom: 8px; }

  .print-only { display: none; }
  @media print {
    @page { size: A4; margin: 16mm 14mm; }
    .screen-only { display: none !important; }
    .print-only { display: block !important; }
    .po-table { width: 100%; border-collapse: collapse; }
    .po-table th, .po-table td { padding: 6px 8px; font-size: 9.5px; text-align: left; }
    .po-table thead { display: table-header-group; }
    .po-table tr { page-break-inside: avoid; }
    .po-section { page-break-before: always; }
  }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="fileInput" accept="application/json,.json" style="display:none">

<script>
(function () {
  "use strict";

  /* =============================================================
     CONFIG / TOKENS
  ============================================================= */
  var T = {
    bg: "#EEEBE2", panel: "#FFFFFF", panelAlt: "#F5F2EA", border: "#DDD8CB", borderSoft: "#E8E3D6",
    textPrimary: "#20242C", textMuted: "#5B6270", textFaint: "#8B8579",
    gold: "#9C7A3E", goldSoft: "#B8935A", rust: "#A6432C", sage: "#4F7A52"
  };
  var ASSET_COLORS = {
    "Versicherung / Altersvorsorge": "#9B8AC4", "Gold (physisch)": "#C9A24A",
    "Festgeld / Termineinlagen": "#7396AC", "Anleihen": "#7FA37F",
    "Fonds / ETF": "#C97B63", "Liquidität / Tagesgeld": "#ACA695",
    "Einzelaktien": "#A75D5D", "Sonstiges": "#5B6270"
  };
  var INST_COLORS = {
    "Commerzbank": "#7396AC", "Sparkasse": "#B5563C", "Wüstenrot": "#7FA37F",
    "Allianz-Versicherung": "#9B8AC4", "Deutsche Bank": "#93989F", "Alte Leipziger": "#ACA695",
    "Eigenverwahrung (Gold)": "#C9A24A", "Nicht zugeordnet": "#454B56"
  };
  var STAND_DATUM = "22.05.2026";
  var STORAGE_KEY = "kapitalvermoegen-positionen-v1";

  // Keine echten Positionsdaten im Quelltext (dieses File landet in einem Git-Repo).
  // Reale Werte werden ausschließlich lokal über "Backup importieren" eingespielt und
  // in localStorage dieses Browsers gehalten — nie im Repository.
  var DEFAULT_POSITIONS = [];

  var DEMO_POSITIONS = [
    { id: 1, label: "Girokonto (Beispiel)", institut: "Musterbank", assetClass: "Liquidität / Tagesgeld", owner: "Gemeinsam", saldo: 12000, zins: 0, faelligkeit: null, zinsen: null, nummer: null },
    { id: 2, label: "Festgeld (Beispiel)", institut: "Musterbank", assetClass: "Festgeld / Termineinlagen", owner: "Gemeinsam", saldo: 40000, zins: 0.025, faelligkeit: "2027-06-01", zinsen: 1000, nummer: null },
    { id: 3, label: "Unternehmensanleihe (Beispiel)", institut: "Musterbank", assetClass: "Anleihen", owner: "Gemeinsam", saldo: 25000, zins: 0.03, faelligkeit: "2029-01-01", zinsen: 750, nummer: null },
    { id: 4, label: "Aktienfonds (Beispiel)", institut: "Musterbank", assetClass: "Fonds / ETF", owner: "Gemeinsam", saldo: 30000, zins: null, faelligkeit: null, zinsen: null, nummer: null },
    { id: 5, label: "Rentenversicherung (Beispiel)", institut: "Musterversicherung", assetClass: "Versicherung / Altersvorsorge", owner: "Horst", saldo: 20000, zins: null, faelligkeit: "2035-01-01", zinsen: null, nummer: null },
    { id: 6, label: "Gold 250g (Beispiel)", institut: "Eigenverwahrung (Gold)", assetClass: "Gold (physisch)", owner: "Gemeinsam", saldo: 18000, zins: null, faelligkeit: null, zinsen: null, nummer: null }
  ];

  /* =============================================================
     STATE
  ============================================================= */
  var STATE = {
    positions: loadPositions(),
    search: "", filterInst: "Alle", filterClass: "Alle",
    sortKey: "saldo", sortDir: "desc",
    editMode: false, saveNote: ""
  };

  function loadPositions() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var arr = JSON.parse(raw);
        if (Array.isArray(arr)) return arr;
      }
    } catch (e) { /* localStorage nicht verfügbar oder Daten defekt */ }
    return DEFAULT_POSITIONS.slice();
  }

  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE.positions));
      flashNote("Gespeichert");
    } catch (e) {
      flashNote("Speichern fehlgeschlagen");
    }
  }

  var flashTimer = null;
  function flashNote(msg) {
    STATE.saveNote = msg;
    renderSaveNoteOnly();
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function () { STATE.saveNote = ""; renderSaveNoteOnly(); }, 1800);
  }
  function renderSaveNoteOnly() {
    var el = document.getElementById("saveNote");
    if (el) el.textContent = STATE.saveNote;
  }

  /* =============================================================
     FORMATTING HELPERS
  ============================================================= */
  function eur(n, digits) {
    digits = digits === undefined ? 0 : digits;
    return new Intl.NumberFormat("de-DE", { style: "currency", currency: "EUR", minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n || 0);
  }
  function eur0(n) { return eur(n, 0); }
  function pct(n, digits) {
    digits = digits === undefined ? 1 : digits;
    if (n === null || n === undefined || isNaN(n)) return "–";
    return (n * 100).toFixed(digits).replace(".", ",") + " %";
  }
  function num(n) { return new Intl.NumberFormat("de-DE").format(n); }
  function dateDe(iso) { return iso ? iso.split("-").reverse().join(".") : "–"; }
  function escapeHtml(s) {
    return String(s === null || s === undefined ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function parseAK(label) {
    var m = /([\d.]+,\d+)\s*EUR/.exec(label || "");
    return m ? parseFloat(m[1].replace(/\./g, "").replace(",", ".")) : null;
  }

  /* =============================================================
     AGGREGATES
  ============================================================= */
  function groupSum(positions, key) {
    var m = {}, order = [];
    positions.forEach(function (p) {
      var k = p[key];
      if (!(k in m)) { m[k] = 0; order.push(k); }
      m[k] += p.saldo;
    });
    return order.map(function (name) { return { name: name, value: m[name] }; })
      .sort(function (a, b) { return b.value - a.value; });
  }

  function computeAll(positions) {
    var total = positions.reduce(function (s, p) { return s + (Number(p.saldo) || 0); }, 0);
    var byClass = groupSum(positions, "assetClass");
    var byInst = groupSum(positions, "institut");
    var byOwner = groupSum(positions, "owner");
    var hhi = total ? byInst.reduce(function (s, i) { return s + Math.pow((i.value / total) * 100, 2); }, 0) : 0;

    var rated = positions.filter(function (p) { return p.zins !== null && p.zins !== undefined; });
    var base = rated.reduce(function (s, p) { return s + p.saldo; }, 0);
    var weightedRate = base ? rated.reduce(function (s, p) { return s + p.saldo * p.zins; }, 0) / base : 0;

    var totalInterest = positions.reduce(function (s, p) {
      if (p.zinsen !== null && p.zinsen !== undefined) return s + p.zinsen;
      if (p.zins !== null && p.zins !== undefined) return s + p.saldo * p.zins;
      return s;
    }, 0);

    var gold = positions.filter(function (p) { return p.assetClass === "Gold (physisch)"; });
    var goldValue = gold.reduce(function (s, p) { return s + p.saldo; }, 0);
    var goldAK = gold.reduce(function (s, p) { return s + (parseAK(p.label) || 0); }, 0);

    var withDate = positions.filter(function (p) { return p.faelligkeit; });
    var years = [];
    withDate.forEach(function (p) { var y = p.faelligkeit.slice(0, 4); if (years.indexOf(y) === -1) years.push(y); });
    years.sort();
    var maturityClasses = [];
    withDate.forEach(function (p) { if (maturityClasses.indexOf(p.assetClass) === -1) maturityClasses.push(p.assetClass); });
    var maturityTimeline = years.map(function (y) {
      var row = { year: y };
      maturityClasses.forEach(function (c) {
        row[c] = withDate.filter(function (p) { return p.faelligkeit.slice(0, 4) === y && p.assetClass === c; })
          .reduce(function (s, p) { return s + p.saldo; }, 0);
      });
      return row;
    });

    return {
      total: total, byClass: byClass, byInst: byInst, byOwner: byOwner, hhi: hhi,
      weightedRate: weightedRate, weightedBase: base, totalInterest: totalInterest,
      gold: { count: gold.length, value: goldValue, ak: goldAK, gain: goldValue - goldAK },
      maturityTimeline: maturityTimeline, maturityClasses: maturityClasses
    };
  }

  function filteredSortedPositions() {
    var rows = STATE.positions.filter(function (p) {
      if (STATE.filterInst !== "Alle" && p.institut !== STATE.filterInst) return false;
      if (STATE.filterClass !== "Alle" && p.assetClass !== STATE.filterClass) return false;
      if (STATE.search) {
        var hay = (p.label + " " + p.institut + " " + p.assetClass).toLowerCase();
        if (hay.indexOf(STATE.search.toLowerCase()) === -1) return false;
      }
      return true;
    });
    rows.sort(function (a, b) {
      var av = a[STATE.sortKey], bv = b[STATE.sortKey];
      if (typeof av === "string" || typeof bv === "string") {
        av = av || ""; bv = bv || "";
        return STATE.sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      av = av || 0; bv = bv || 0;
      return STATE.sortDir === "asc" ? av - bv : bv - av;
    });
    return rows;
  }

  /* =============================================================
     SVG CHARTS (dependency-free)
  ============================================================= */
  function donutSVG(data, total, size) {
    if (!total || !data.length) {
      return '<div style="width:' + size + 'px;height:' + size + 'px;display:flex;align-items:center;justify-content:center;color:' + T.textFaint + ';font-size:12px;border:1px dashed ' + T.border + ';border-radius:50%;">keine Daten</div>';
    }
    var cx = size / 2, cy = size / 2, r = size / 2 - 6, ir = r * 0.56;
    var angle = -90, paths = [];
    data.forEach(function (d) {
      var frac = d.value / total;
      var sweep = Math.min(frac * 360, 359.99);
      var large = sweep > 180 ? 1 : 0;
      var a1 = angle * Math.PI / 180, a2 = (angle + sweep) * Math.PI / 180;
      var x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      var x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      var ix1 = cx + ir * Math.cos(a2), iy1 = cy + ir * Math.sin(a2);
      var ix2 = cx + ir * Math.cos(a1), iy2 = cy + ir * Math.sin(a1);
      var color = ASSET_COLORS[d.name] || T.textFaint;
      paths.push('<path d="M ' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' +
        x2.toFixed(2) + ' ' + y2.toFixed(2) + ' L ' + ix1.toFixed(2) + ' ' + iy1.toFixed(2) + ' A ' + ir + ' ' + ir +
        ' 0 ' + large + ' 0 ' + ix2.toFixed(2) + ' ' + iy2.toFixed(2) + ' Z" fill="' + color + '" stroke="' + T.panel + '" stroke-width="2">' +
        '<title>' + escapeHtml(d.name) + ': ' + eur0(d.value) + '</title></path>');
      angle += sweep;
    });
    return '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' + paths.join("") +
      '<text x="' + cx + '" y="' + (cy - 6) + '" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="' + T.textPrimary + '">' + eur0(total) + '</text>' +
      '<text x="' + cx + '" y="' + (cy + 14) + '" text-anchor="middle" font-size="9" fill="' + T.textMuted + '">Gesamtvermögen</text></svg>';
  }

  function maturityBarsSVG(rows, classes, width, height) {
    if (!rows.length) {
      return '<div style="height:' + height + 'px;display:flex;align-items:center;justify-content:center;color:' + T.textFaint + ';font-size:12px;">keine Fälligkeiten hinterlegt</div>';
    }
    var pad = { top: 10, right: 10, bottom: 24, left: 46 };
    var innerW = width - pad.left - pad.right, innerH = height - pad.top - pad.bottom;
    var maxVal = 1;
    rows.forEach(function (r) {
      var sum = classes.reduce(function (s, c) { return s + (r[c] || 0); }, 0);
      if (sum > maxVal) maxVal = sum;
    });
    var gap = innerW / rows.length, barW = gap * 0.6;
    var bars = [], ticks = [], xLabels = [];
    [0, 0.5, 1].forEach(function (f) {
      var val = maxVal * f, y = pad.top + innerH - f * innerH;
      ticks.push('<line x1="' + pad.left + '" x2="' + (width - pad.right) + '" y1="' + y.toFixed(1) + '" y2="' + y.toFixed(1) + '" stroke="' + T.borderSoft + '" stroke-width="1"/>');
      ticks.push('<text x="' + (pad.left - 6) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end" font-size="8" fill="' + T.textMuted + '">' + (val / 1000).toFixed(0) + 'k</text>');
    });
    rows.forEach(function (r, i) {
      var yCum = 0;
      var x = pad.left + i * gap + (gap - barW) / 2;
      classes.forEach(function (c) {
        var v = r[c] || 0;
        if (!v) return;
        var h = (v / maxVal) * innerH;
        var y = pad.top + innerH - yCum - h;
        var color = ASSET_COLORS[c] || T.textFaint;
        bars.push('<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + h.toFixed(1) + '" fill="' + color + '"><title>' + escapeHtml(c) + ' ' + r.year + ': ' + eur0(v) + '</title></rect>');
        yCum += h;
      });
      xLabels.push('<text x="' + (x + barW / 2).toFixed(1) + '" y="' + (height - 6) + '" text-anchor="middle" font-size="8" fill="' + T.textMuted + '">' + r.year + '</text>');
    });
    return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="' + height + '">' + ticks.join("") + bars.join("") + xLabels.join("") + '</svg>';
  }

  /* =============================================================
     MUTATIONS
  ============================================================= */
  function updatePosition(id, field, value) {
    var p = STATE.positions.find(function (p) { return p.id === id; });
    if (!p) return;
    p[field] = value;
    persist();
  }

  function addPosition() {
    var nextId = STATE.positions.reduce(function (m, p) { return Math.max(m, p.id); }, 0) + 1;
    STATE.positions.push({
      id: nextId, label: "Neue Position", nummer: "", institut: "Sparkasse",
      assetClass: "Liquidität / Tagesgeld", owner: "Gemeinsam",
      saldo: 0, zins: null, faelligkeit: null, zinsen: null
    });
    persist();
    STATE.editMode = true; STATE.sortKey = "id"; STATE.sortDir = "desc";
    STATE.filterInst = "Alle"; STATE.filterClass = "Alle"; STATE.search = "";
    render();
  }

  function deletePosition(id) {
    var p = STATE.positions.find(function (p) { return p.id === id; });
    if (!p) return;
    if (!confirm('"' + p.label + '" wirklich löschen?')) return;
    STATE.positions = STATE.positions.filter(function (p) { return p.id !== id; });
    persist();
    render();
  }

  function resetData() {
    if (!confirm("Alle Positionen löschen und auf leeren Ausgangszustand zurücksetzen?")) return;
    STATE.positions = [];
    persist();
    render();
  }

  function loadDemo() {
    if (STATE.positions.length && !confirm("Beispieldaten laden? Der aktuelle Stand im Tool wird überschrieben.")) return;
    STATE.positions = JSON.parse(JSON.stringify(DEMO_POSITIONS));
    persist();
    render();
  }

  function downloadBlob(content, filename, mime) {
    var blob = new Blob([content], { type: mime });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function exportBackup() {
    var payload = { exportedAt: new Date().toISOString(), standDatum: STAND_DATUM, version: 1, positions: STATE.positions };
    var dateStr = new Date().toISOString().slice(0, 10);
    downloadBlob(JSON.stringify(payload, null, 2), "Kapitalvermoegen-Backup-" + dateStr + ".json", "application/json");
    flashNote("Backup heruntergeladen");
  }

  function exportCSV() {
    var headers = ["Bezeichnung", "Institut", "Anlageklasse", "Eigentümer", "Saldo", "Zins", "Fälligkeit", "Nummer"];
    function esc(v) { return '"' + String(v === null || v === undefined ? "" : v).replace(/"/g, '""') + '"'; }
    var rows = STATE.positions.map(function (p) {
      return [p.label, p.institut, p.assetClass, p.owner,
        String(p.saldo).replace(".", ","),
        (p.zins !== null && p.zins !== undefined) ? String(p.zins).replace(".", ",") : "",
        p.faelligkeit || "", p.nummer || ""].map(esc).join(";");
    });
    var csv = "\uFEFF" + [headers.map(esc).join(";")].concat(rows).join("\r\n");
    var dateStr = new Date().toISOString().slice(0, 10);
    downloadBlob(csv, "Kapitalvermoegen-Export-" + dateStr + ".csv", "text/csv;charset=utf-8;");
    flashNote("CSV heruntergeladen");
  }

  function importBackup(file) {
    var reader = new FileReader();
    reader.onload = function (evt) {
      try {
        var parsed = JSON.parse(evt.target.result);
        var arr = Array.isArray(parsed) ? parsed : parsed.positions;
        if (!Array.isArray(arr) || arr.length === 0) throw new Error("leer");
        var valid = arr.every(function (p) { return p && typeof p.saldo === "number" && typeof p.label === "string"; });
        if (!valid) throw new Error("Struktur");
        if (!confirm(arr.length + " Positionen aus dieser Datei importieren? Der aktuelle Stand im Tool wird überschrieben.")) return;
        STATE.positions = arr;
        persist();
        render();
      } catch (err) {
        flashNote("Import fehlgeschlagen — ungültige Datei");
      }
    };
    reader.readAsText(file);
  }

  /* =============================================================
     FOCUS-PRESERVING RE-RENDER (for the live search field)
  ============================================================= */
  function withFocusPreserved(fn) {
    var active = document.activeElement;
    var id = active && active.id;
    var selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;
    var selEnd = active && typeof active.selectionEnd === "number" ? active.selectionEnd : null;
    fn();
    if (id) {
      var el = document.getElementById(id);
      if (el) {
        el.focus();
        if (selStart !== null && el.setSelectionRange) {
          try { el.setSelectionRange(selStart, selEnd); } catch (e) { /* ignore */ }
        }
      }
    }
  }

  /* =============================================================
     RENDER
  ============================================================= */
  function render() {
    var agg = computeAll(STATE.positions);
    var app = document.getElementById("app");
    app.innerHTML = renderScreen(agg) + renderPrintOnly(agg);
    wireEvents(agg);
  }

  function renderScreen(agg) {
    var total = agg.total;
    var hasData = STATE.positions.length > 0;

    var kpis =
      '<div class="stat-label">Positionen</div><div class="stat-value">' + num(STATE.positions.length) + '</div>';

    var html = '<div class="screen-only"><div class="wrap">';

    // HERO
    html += '<div style="margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;">' +
      '<div><div style="font-size:12px;color:' + T.textFaint + ';letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">Kapitalvermögen · Michaela &amp; Horst · Stand ' + STAND_DATUM + '</div>' +
      '<div class="serif" style="font-size:48px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;">' + eur0(total) + '</div></div>' +
      '<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end;">' +
      statChip("Positionen", num(STATE.positions.length)) +
      statChip("Ø Verzinsung (verzinst)", pct(agg.weightedRate)) +
      statChip("Erw. Zinsertrag p.a.", eur0(agg.totalInterest), T.gold) +
      statChip("HHI Institute", agg.hhi ? agg.hhi.toFixed(0) : "–", agg.hhi > 2500 ? T.rust : T.textPrimary) +
      '<button class="print-btn" id="printBtn">⎙ Bericht drucken</button>' +
      '</div></div>';

    if (!hasData) {
      html += '<div class="panel"><div class="empty-state">' +
        '<h3>Noch keine Positionen erfasst</h3>' +
        '<p>Importiere ein zuvor exportiertes Backup (JSON) oder lade Beispieldaten, um die Ansicht zu testen.</p>' +
        '<div style="display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;">' +
        '<button class="pill" id="importBtnEmpty">⬆ Backup importieren</button>' +
        '<button class="pill" id="demoBtn">Beispieldaten laden</button>' +
        '</div></div></div></div></div>';
      return html;
    }

    // CONCENTRATION RIBBON
    html += '<div class="panel"><div class="panel-title">Konzentration nach Institut</div>' +
      '<div class="panel-subtitle">Herfindahl-Index ' + agg.hhi.toFixed(0) + ' von 10.000 — ' +
      (agg.hhi > 2500 ? "hohe Konzentration, oberhalb gängiger Aufsichts-Schwellenwerte für Klumpenrisiken" : "moderate Streuung") +
      '. Größtes Einzelrisiko: ' + escapeHtml(agg.byInst[0].name) + ' mit ' + pct(agg.byInst[0].value / total) + '.</div>' +
      '<div style="display:flex;height:32px;border-radius:3px;overflow:hidden;border:1px solid ' + T.border + ';">' +
      agg.byInst.map(function (i) {
        var w = (i.value / total) * 100;
        return '<div title="' + escapeHtml(i.name) + ': ' + eur0(i.value) + ' (' + pct(i.value / total) + ')" style="width:' + w + '%;background:' + (INST_COLORS[i.name] || T.textFaint) + ';min-width:' + (w > 0.5 ? 2 : 0) + 'px;"></div>';
      }).join("") + '</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:9px 20px;margin-top:2px;">' +
      agg.byInst.map(function (i) {
        return '<div class="legend-row"><span class="swatch" style="background:' + (INST_COLORS[i.name] || T.textFaint) + ';"></span>' +
          '<span style="color:' + T.textMuted + ';">' + escapeHtml(i.name) + '</span>' +
          '<span style="font-variant-numeric:tabular-nums;">' + eur0(i.value) + '</span>' +
          '<span style="color:' + T.textFaint + ';">(' + pct(i.value / total) + ')</span></div>';
      }).join("") + '</div></div>';

    // GRID: allocation + owner + gold
    html += '<div style="display:grid;grid-template-columns:1.3fr 1fr;gap:18px;">';
    html += '<div class="panel"><div class="panel-title">Vermögen nach Anlageklasse</div>' +
      '<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;">' +
      '<div style="flex-shrink:0;">' + donutSVG(agg.byClass, total, 190) + '</div>' +
      '<div style="flex:1;min-width:220px;display:flex;flex-direction:column;gap:7px;">' +
      agg.byClass.map(function (c) {
        return '<div class="legend-row"><span class="swatch" style="background:' + (ASSET_COLORS[c.name] || T.textFaint) + ';"></span>' +
          '<span style="flex:1;">' + escapeHtml(c.name) + '</span>' +
          '<span style="color:' + T.textMuted + ';font-variant-numeric:tabular-nums;">' + pct(c.value / total) + '</span>' +
          '<span style="width:90px;text-align:right;font-variant-numeric:tabular-nums;">' + eur0(c.value) + '</span></div>';
      }).join("") + '</div></div></div>';

    html += '<div style="display:flex;flex-direction:column;gap:18px;">';
    html += '<div class="panel"><div class="panel-title">Zuordnung Eigentümer</div>' +
      agg.byOwner.map(function (o) {
        var w = (o.value / total) * 100;
        return '<div><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">' +
          '<span>' + escapeHtml(o.name) + '</span><span style="color:' + T.textMuted + ';font-variant-numeric:tabular-nums;">' + eur0(o.value) + ' · ' + pct(o.value / total) + '</span></div>' +
          '<div style="height:6px;border-radius:3px;background:' + T.panelAlt + ';overflow:hidden;"><div style="width:' + w + '%;height:100%;background:' + T.goldSoft + ';"></div></div></div>';
      }).join("") + '</div>';

    if (agg.gold.count) {
      html += '<div class="panel"><div class="panel-title">Gold — physische Reserve</div>' +
        '<div class="panel-subtitle">' + agg.gold.count + ' Barren à 250 g · Bewertung zum aktuellen Kurs</div>' +
        '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;">' +
        '<div><div class="stat-label">Aktueller Wert</div><div class="serif" style="font-size:19px;color:' + T.gold + ';font-variant-numeric:tabular-nums;">' + eur0(agg.gold.value) + '</div></div>' +
        '<div><div class="stat-label">Anschaffungskosten</div><div style="font-size:15px;color:' + T.textMuted + ';font-variant-numeric:tabular-nums;">' + eur0(agg.gold.ak) + '</div></div>' +
        '<div><div class="stat-label">Stille Reserve</div><div style="font-size:15px;color:' + T.sage + ';font-variant-numeric:tabular-nums;">+' + eur0(agg.gold.gain) + '</div></div>' +
        '</div></div>';
    }
    html += '</div></div>'; // end grid

    // MATURITY
    html += '<div class="panel"><div class="panel-title">Fälligkeiten im Zeitverlauf</div>' +
      '<div class="panel-subtitle">Nur Positionen mit festem Fälligkeitsdatum (Festgeld, Anleihen, Versicherungen)</div>' +
      maturityBarsSVG(agg.maturityTimeline, agg.maturityClasses, 900, 240) +
      '<div style="display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:2px;">' +
      agg.maturityClasses.map(function (c) {
        return '<div class="legend-row"><span class="swatch" style="background:' + (ASSET_COLORS[c] || T.textFaint) + ';"></span><span style="color:' + T.textMuted + ';">' + escapeHtml(c) + '</span></div>';
      }).join("") + '</div></div>';

    // TABLE
    var institutes = ["Alle"].concat(uniqueSorted(STATE.positions.map(function (p) { return p.institut; })));
    var assetClasses = ["Alle"].concat(uniqueSorted(STATE.positions.map(function (p) { return p.assetClass; })));
    var rows = filteredSortedPositions();

    html += '<div class="panel"><div class="panel-title">Einzelpositionen</div>' +
      '<div class="panel-subtitle">' + rows.length + ' von ' + STATE.positions.length + ' Positionen</div>';

    html += '<div class="toolbar">' +
      '<input class="search" type="text" id="searchInput" placeholder="Suche…" value="' + escapeHtml(STATE.search) + '">' +
      '<select class="filter" id="filterInst">' + institutes.map(function (i) { return '<option' + (i === STATE.filterInst ? " selected" : "") + '>' + escapeHtml(i) + '</option>'; }).join("") + '</select>' +
      '<select class="filter" id="filterClass">' + assetClasses.map(function (c) { return '<option' + (c === STATE.filterClass ? " selected" : "") + '>' + escapeHtml(c) + '</option>'; }).join("") + '</select>' +
      '<div style="flex:1;"></div>' +
      (STATE.editMode ? '<button class="pill" id="addBtn">+ Neue Position</button>' : "") +
      '<button class="pill' + (STATE.editMode ? " active" : "") + '" id="editToggle">' + (STATE.editMode ? "Bearbeitung beenden" : "Bearbeiten") + '</button>' +
      '<button class="pill" id="resetBtn">Zurücksetzen</button>' +
      '<span id="saveNote" style="font-size:11px;color:' + T.textFaint + ';">' + STATE.saveNote + '</span>' +
      '</div>';

    html += '<div class="toolbar toolbar-sep">' +
      '<span style="font-size:11px;color:' + T.textFaint + ';text-transform:uppercase;letter-spacing:0.06em;">Datensicherung</span>' +
      '<button class="pill" id="exportBackupBtn">⬇ Backup exportieren (JSON)</button>' +
      '<button class="pill" id="importBackupBtn">⬆ Backup importieren</button>' +
      '<button class="pill" id="exportCsvBtn">⬇ Als CSV (Excel)</button>' +
      '</div>';

    html += '<div class="scrollbox"><table><thead><tr>' +
      sortTh("label", "Bezeichnung") + sortTh("nummer", "Nummer") + sortTh("institut", "Institut") +
      sortTh("assetClass", "Anlageklasse") + sortTh("owner", "Eigentümer") +
      sortTh("saldo", "Saldo", "right") + sortTh("zins", "Zins %", "right") + sortTh("faelligkeit", "Fälligkeit") +
      (STATE.editMode ? '<th style="cursor:default;"></th>' : "") +
      '</tr></thead><tbody>';

    rows.forEach(function (p) {
      html += '<tr>' +
        '<td style="max-width:220px;">' + (STATE.editMode ? '<input data-id="' + p.id + '" data-field="label" value="' + escapeHtml(p.label) + '">' : escapeHtml(p.label)) + '</td>' +
        '<td style="color:' + T.textMuted + ';">' + (STATE.editMode ? '<input data-id="' + p.id + '" data-field="nummer" value="' + escapeHtml(p.nummer || "") + '">' : escapeHtml(p.nummer || "–")) + '</td>' +
        '<td><span class="legend-row"><span class="swatch" style="background:' + (INST_COLORS[p.institut] || T.textFaint) + ';"></span>' + escapeHtml(p.institut) + '</span></td>' +
        '<td style="color:' + T.textMuted + ';">' + escapeHtml(p.assetClass) + '</td>' +
        '<td style="color:' + T.textMuted + ';">' + escapeHtml(p.owner) + '</td>' +
        '<td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:500;">' +
        (STATE.editMode ? '<input type="number" step="0.01" data-id="' + p.id + '" data-field="saldo" value="' + p.saldo + '" style="text-align:right;">' : eur(p.saldo, 2)) + '</td>' +
        '<td style="text-align:right;font-variant-numeric:tabular-nums;">' +
        (STATE.editMode ? '<input type="number" step="0.001" data-id="' + p.id + '" data-field="zins" value="' + (p.zins === null || p.zins === undefined ? "" : p.zins) + '" style="text-align:right;">' : ((p.zins !== null && p.zins !== undefined) ? pct(p.zins, 2) : "–")) + '</td>' +
        '<td style="color:' + T.textMuted + ';">' + dateDe(p.faelligkeit) + '</td>' +
        (STATE.editMode ? '<td><button data-del="' + p.id + '" style="background:transparent;border:1px solid ' + T.border + ';color:' + T.rust + ';border-radius:3px;width:24px;height:24px;cursor:pointer;font-size:13px;line-height:1;">×</button></td>' : "") +
        '</tr>';
    });
    html += '</tbody></table></div></div>';

    html += '<div style="margin-top:20px;font-size:11px;color:' + T.textFaint + ';line-height:1.6;">' +
      'Hinweise: „Nicht zugeordnet" bezeichnet Positionen ohne im Datenblatt vermerktes depotführendes Institut. ' +
      'Zinserträge sind kalkulatorisch (Saldo × Zinssatz p.a.) und berücksichtigen keine Steuern oder Vorfälligkeitsentgelte. ' +
      'Der HHI (Herfindahl-Hirschman-Index) misst die Konzentration über die depotführenden Institute; Werte über 2.500 gelten ' +
      'gemeinhin als hochkonzentriert. Alle Daten werden ausschließlich lokal in diesem Browser gespeichert (localStorage).' +
      '</div>';

    html += '</div></div>'; // wrap, screen-only
    return html;
  }

  function statChip(label, value, color) {
    return '<div style="display:flex;flex-direction:column;gap:3px;min-width:120px;">' +
      '<div class="stat-label">' + label + '</div>' +
      '<div class="stat-value" style="color:' + (color || T.textPrimary) + ';">' + value + '</div></div>';
  }

  function sortTh(key, label, align) {
    var active = STATE.sortKey === key;
    var arrow = active ? (STATE.sortDir === "asc" ? "▲" : "▼") : "↕";
    return '<th data-sort="' + key + '" class="' + (active ? "sort-active" : "") + '"' +
      (align ? ' style="text-align:' + align + ';"' : "") + '>' + label +
      '<span style="margin-left:5px;font-size:9px;opacity:' + (active ? 1 : 0.5) + ';">' + arrow + '</span></th>';
  }

  function uniqueSorted(arr) {
    var seen = {}, out = [];
    arr.forEach(function (v) { if (!(v in seen)) { seen[v] = true; out.push(v); } });
    return out.sort();
  }

  /* =============================================================
     PRINT-ONLY REPORT (mirrors the screen dashboard, light theme)
  ============================================================= */
  function renderPrintOnly(agg) {
    var total = agg.total;
    if (!STATE.positions.length) return '<div class="print-only"></div>';
    var PI = "#1F2733", PM = "#6B7280", PG = "#B8935A", PP = "#F6F4EF";
    function th(label, align) { return '<th style="background:' + PI + ';color:#fff;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.03em;padding:5px 7px;' + (align ? "text-align:" + align + ";" : "") + '">' + label + '</th>'; }
    function td(val, i, align) { return '<td style="padding:5px 7px;background:' + (i % 2 ? PP : "#fff") + ';' + (align ? "text-align:" + align + ";" : "") + '">' + val + '</td>'; }

    var html = '<div class="print-only" style="background:#fff;color:' + PI + ';font-family:Arial,sans-serif;font-size:11px;">';
    html += '<div style="font-size:11px;color:' + PM + ';font-weight:700;letter-spacing:0.12em;">KAPITALVERMÖGEN</div>' +
      '<div class="serif" style="font-size:32px;font-weight:600;color:' + PI + ';margin:4px 0 6px;">Vermögensübersicht</div>' +
      '<div style="border-bottom:2px solid ' + PG + ';padding-bottom:10px;margin-bottom:16px;font-size:13px;color:' + PM + ';">Michaela &amp; Horst · Stand ' + STAND_DATUM + '</div>';

    html += '<table style="width:100%;border-collapse:collapse;margin-bottom:16px;"><tbody><tr>';
    [["Gesamtvermögen", eur0(total), PI], ["Positionen", num(STATE.positions.length), PI],
     ["Ø Verzinsung", pct(agg.weightedRate, 2), PI], ["Zinsertrag p.a.", eur0(agg.totalInterest), PG]].forEach(function (kv) {
      html += '<td style="background:' + PP + ';padding:10px 14px;width:25%;">' +
        '<div style="font-size:8.5px;color:' + PM + ';font-weight:700;text-transform:uppercase;letter-spacing:0.05em;">' + kv[0] + '</div>' +
        '<div class="serif" style="font-size:17px;font-weight:700;color:' + kv[2] + ';">' + kv[1] + '</div></td>';
    });
    html += '</tr></tbody></table>';

    html += '<p style="line-height:1.6;margin-bottom:16px;">Zum Stichtag ' + STAND_DATUM + ' beläuft sich das gemeinsame Kapitalvermögen auf ' + eur0(total) +
      ', verteilt über ' + STATE.positions.length + ' Einzelpositionen bei ' + agg.byInst.length + ' depotführenden Instituten. Von den verzinslich geführten ' +
      'Positionen (Basis ' + eur0(agg.weightedBase) + ') resultiert eine gewichtete Durchschnittsverzinsung von ' + pct(agg.weightedRate, 2) +
      ', was einem kalkulatorischen Zinsertrag von rund ' + eur0(agg.totalInterest) + ' pro Jahr entspricht.</p>';

    html += '<h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Allokation nach Anlageklasse</h3>' +
      '<table class="po-table" style="margin-top:8px;margin-bottom:18px;"><thead><tr>' + th("Anlageklasse") + th("Anteil", "right") + th("Wert", "right") + '</tr></thead><tbody>' +
      agg.byClass.map(function (c, i) { return '<tr>' + td(escapeHtml(c.name), i) + td(pct(c.value / total), i, "right") + td(eur0(c.value), i, "right") + '</tr>'; }).join("") +
      '</tbody></table>';

    html += '<h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Konzentration nach Institut</h3>' +
      '<p style="line-height:1.6;margin:8px 0 12px;">Der Herfindahl-Hirschman-Index (HHI) über die depotführenden Institute liegt bei ' + agg.hhi.toFixed(0) + ' von 10.000 Punkten. ' +
      (agg.hhi > 2500 ? "Das entspricht einer hohen Konzentration oberhalb gängiger aufsichtlicher Schwellenwerte für Klumpenrisiken." :
        "Das entspricht einer moderaten Streuung, liegt aber über einer Gleichverteilung auf " + agg.byInst.length + " Institute (HHI ≈ " + (10000 / agg.byInst.length).toFixed(0) + ").") +
      ' Größte Einzelposition ist ' + escapeHtml(agg.byInst[0].name) + ' mit ' + eur0(agg.byInst[0].value) + ' (' + pct(agg.byInst[0].value / total) + ').</p>' +
      '<table class="po-table" style="margin-bottom:18px;"><thead><tr>' + th("Institut") + th("Anteil", "right") + th("Wert", "right") + '</tr></thead><tbody>' +
      agg.byInst.map(function (c, i) { return '<tr>' + td(escapeHtml(c.name), i) + td(pct(c.value / total), i, "right") + td(eur0(c.value), i, "right") + '</tr>'; }).join("") +
      '</tbody></table>';

    html += '<h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Zuordnung nach Eigentümer</h3>' +
      '<table class="po-table" style="margin-top:8px;margin-bottom:18px;"><thead><tr>' + th("Eigentümer") + th("Anteil", "right") + th("Wert", "right") + '</tr></thead><tbody>' +
      agg.byOwner.map(function (c, i) { return '<tr>' + td(escapeHtml(c.name), i) + td(pct(c.value / total), i, "right") + td(eur0(c.value), i, "right") + '</tr>'; }).join("") +
      '</tbody></table>';

    html += '<div class="po-section">';
    if (agg.maturityTimeline.length) {
      html += '<h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Fälligkeiten im Zeitverlauf</h3>' +
        '<table class="po-table" style="margin-bottom:18px;"><thead><tr>' + th("Jahr") +
        agg.maturityClasses.map(function (c) { return th(escapeHtml(c), "right"); }).join("") + th("Summe", "right") + '</tr></thead><tbody>' +
        agg.maturityTimeline.map(function (row, i) {
          var sum = agg.maturityClasses.reduce(function (s, c) { return s + (row[c] || 0); }, 0);
          return '<tr>' + td(row.year, i) + agg.maturityClasses.map(function (c) { return td(row[c] ? eur0(row[c]) : "–", i, "right"); }).join("") + td('<b>' + eur0(sum) + '</b>', i, "right") + '</tr>';
        }).join("") + '</tbody></table>';
    }
    if (agg.gold.count) {
      html += '<h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Sonderposition: physisches Gold</h3>' +
        '<p style="line-height:1.6;margin:8px 0 18px;">' + agg.gold.count + ' Barren zu je 250 g werden zum aktuellen Kurs mit insgesamt ' + eur0(agg.gold.value) +
        ' bewertet. Den historischen Anschaffungskosten von ' + eur0(agg.gold.ak) + ' steht damit eine stille Reserve von ' + eur0(agg.gold.gain) +
        ' gegenüber. Die Position wird in Eigenverwahrung gehalten.</p>';
    }
    html += '</div>';

    html += '<div class="po-section"><h3 class="serif" style="font-size:17px;border-bottom:1px solid ' + PG + ';padding-bottom:6px;">Anhang: Einzelpositionen</h3>' +
      '<p style="font-size:9.5px;color:' + PM + ';font-style:italic;margin:8px 0 10px;">Sortiert nach Saldo absteigend, ' + STATE.positions.length + ' Positionen, Stand ' + STAND_DATUM + '.</p>' +
      '<table class="po-table"><thead><tr>' + th("Bezeichnung") + th("Institut") + th("Anlageklasse") + th("Saldo", "right") + th("Zins", "right") + th("Fälligkeit") + '</tr></thead><tbody>' +
      STATE.positions.slice().sort(function (a, b) { return b.saldo - a.saldo; }).map(function (p, i) {
        return '<tr>' + td(escapeHtml(p.label), i) + td(escapeHtml(p.institut), i) + td(escapeHtml(p.assetClass.replace(" / ", "/")), i) +
          td(eur(p.saldo, 2), i, "right") + td((p.zins !== null && p.zins !== undefined) ? pct(p.zins, 2) : "–", i, "right") + td(dateDe(p.faelligkeit), i) + '</tr>';
      }).join("") + '</tbody></table></div>';

    html += '<p style="font-size:9px;color:' + PM + ';font-style:italic;line-height:1.6;margin-top:18px;">Hinweise: „Nicht zugeordnet" bezeichnet Positionen ohne im Datenblatt vermerktes depotführendes Institut. ' +
      'Zinserträge sind kalkulatorisch und berücksichtigen keine Steuern oder Abgeltungssteuer. Kursgewinne bei Fonds, ETFs und Einzelaktien sind nicht enthalten. Alle Angaben ohne Gewähr.</p>';
    html += '</div>';
    return html;
  }

  /* =============================================================
     EVENTS
  ============================================================= */
  function wireEvents() {
    var printBtn = document.getElementById("printBtn");
    if (printBtn) printBtn.addEventListener("click", function () { window.print(); });

    var demoBtn = document.getElementById("demoBtn");
    if (demoBtn) demoBtn.addEventListener("click", loadDemo);

    var importBtnEmpty = document.getElementById("importBtnEmpty");
    if (importBtnEmpty) importBtnEmpty.addEventListener("click", function () { document.getElementById("fileInput").click(); });

    var searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.addEventListener("input", function (e) {
      STATE.search = e.target.value;
      withFocusPreserved(render);
    });

    var filterInst = document.getElementById("filterInst");
    if (filterInst) filterInst.addEventListener("change", function (e) { STATE.filterInst = e.target.value; render(); });

    var filterClass = document.getElementById("filterClass");
    if (filterClass) filterClass.addEventListener("change", function (e) { STATE.filterClass = e.target.value; render(); });

    var addBtn = document.getElementById("addBtn");
    if (addBtn) addBtn.addEventListener("click", addPosition);

    var editToggle = document.getElementById("editToggle");
    if (editToggle) editToggle.addEventListener("click", function () { STATE.editMode = !STATE.editMode; render(); });

    var resetBtn = document.getElementById("resetBtn");
    if (resetBtn) resetBtn.addEventListener("click", resetData);

    var exportBackupBtn = document.getElementById("exportBackupBtn");
    if (exportBackupBtn) exportBackupBtn.addEventListener("click", exportBackup);

    var exportCsvBtn = document.getElementById("exportCsvBtn");
    if (exportCsvBtn) exportCsvBtn.addEventListener("click", exportCSV);

    var importBackupBtn = document.getElementById("importBackupBtn");
    if (importBackupBtn) importBackupBtn.addEventListener("click", function () { document.getElementById("fileInput").click(); });

    // sortable headers (event delegation)
    var thead = document.querySelector("thead");
    if (thead) thead.addEventListener("click", function (e) {
      var th = e.target.closest("th[data-sort]");
      if (!th) return;
      var key = th.getAttribute("data-sort");
      if (STATE.sortKey === key) STATE.sortDir = STATE.sortDir === "asc" ? "desc" : "asc";
      else { STATE.sortKey = key; STATE.sortDir = "desc"; }
      render();
    });

    // editable cells + delete buttons (event delegation)
    var tbody = document.querySelector("tbody");
    if (tbody) {
      tbody.addEventListener("change", function (e) {
        var input = e.target.closest("input[data-id]");
        if (!input) return;
        var id = Number(input.getAttribute("data-id"));
        var field = input.getAttribute("data-field");
        var value = input.value;
        if (field === "saldo") value = parseFloat(value) || 0;
        else if (field === "zins") value = value === "" ? null : parseFloat(value);
        updatePosition(id, field, value);
        render();
      });
      tbody.addEventListener("click", function (e) {
        var btn = e.target.closest("button[data-del]");
        if (!btn) return;
        deletePosition(Number(btn.getAttribute("data-del")));
      });
    }
  }

  document.getElementById("fileInput").addEventListener("change", function (e) {
    var file = e.target.files && e.target.files[0];
    if (file) importBackup(file);
    e.target.value = "";
  });

  render();
})();
</script>
</body>
</html>
